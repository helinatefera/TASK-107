services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chargeops
      POSTGRES_PASSWORD: chargeops
      POSTGRES_DB: chargeops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chargeops"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://chargeops:chargeops@postgres:5432/chargeops?sslmode=disable"
      MIGRATIONS_DIR: "/migrations"
      SEED_ADMIN_EMAIL: "admin@demo.com"
      SEED_ADMIN_PASSWORD: "AdminPass123!"
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "10"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "postgres://chargeops:chargeops@postgres:5432/chargeops?sslmode=disable"
      API_BASE_URL: "http://app:8080"
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - test

  loadtest:
    build:
      context: ./loadtest
    environment:
      API_BASE_URL: "http://app:8080"
      LOAD_TEST_RPS: "50"
      LOAD_TEST_DURATION: "5m"
      LOAD_TEST_P99_THRESHOLD: "300"
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - loadtest

volumes:
  pgdata:
